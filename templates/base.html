<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <title>{% block title %}Mi Web{% endblock %}</title>

    <!-- Bootstrap 4 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/estilos.css') }}"
    />
    
    <!-- Icons Awesome CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
    />
  </head>
  <body {% block bodyattrs %}{% endblock %}>
    <header
      class="encabezado navbar fixed-top"
      role="banner"
      id="encabezado"
      data-scroll
    >
      <div class="container">
        <a href="{{ url_for('index') }}" class="logo"
          ><img
            src="{{ url_for('static', filename='img/logo.svg') }}"
            alt="logo"
          /><span class="NoEstilo"> Tech Solutions </span>
        </a>

        <input type="checkbox" id="menu-toggle" class="menu-toggle d-md-none" />
        <label for="menu-toggle" class="boton-menu d-md-none">
          <i class="fa fa-bars" aria-hidden="true"></i>
        </label>

        <nav class="menu-principal">
          <ul>
            <li class="{% if request.path == '/' %}active{% endif %}">
              <a href="{{ url_for('index') }}">Inicio</a>
            </li>
            <li {% block nav_nosotros %}{% endblock %}>
              <a href="{{ url_for('nosotros') }}">Nosotros</a>
            </li>
            <li {% block nav_contacto %}{% endblock %}>
              <a href="{{ url_for('contacto') }}">Contactos</a>
            </li>
          </ul>
        </nav>
      </div>
    </header>
    
    {% block content %}
    
    {% endblock %}

    <footer class="piedepagina py-2" role="contentinfo">
      <div class="container">
        <p>2026 © by Javier Jose</p>
      </div>
    </footer>
  </body>
</html>
